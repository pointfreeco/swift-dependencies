name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-15:
    name: macOS 15
    runs-on: macos-15
    strategy:
      matrix:
        config: ['debug', 'release']
        xcode: ['16.4']
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app
      - name: Skip macro validation
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
      - name: Run tests
        run: make test-swift
      - name: Build platforms ${{ matrix.config }}
        run: CONFIG=${{ matrix.config }} make build-all-platforms
      - name: Build for library evolution
        run: make build-for-library-evolution

  ubuntu:
    strategy:
      matrix:
        swift:
          - '6.2'
    name: Ubuntu (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    container: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: swift test --parallel
      - name: Run tests (release)
        run: swift test -c release --parallel

  wasm:
    name: WebAssembly Swift SDK
    uses: apple/swift-nio/.github/workflows/wasm_swift_sdk.yml@main
    with:
      additional_command_arguments: "--target Dependencies --target DependenciesMacros"

  android:
    name: Android
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: ['debug']
        swift: ['6.2']
    steps:
      - uses: actions/checkout@v4
      - name: Build Swift Package on Android
        uses: skiptools/swift-android-action@v2
        with:
          # disable combine traits on Android as it wasn't building yet
          swift-build-flags: "--disable-default-traits"
          swift-version: ${{ matrix.swift }}
          swift-configuration: ${{ matrix.config }}
          run-tests: false
          build-tests: false

  # windows:
  #   name: Windows
  #   runs-on: windows-latest
  #   steps:
  #     - uses: compnerd/gha-setup-swift@main
  #       with:
  #         branch: swift-5.10-release
  #         tag: 5.10-RELEASE
  #
  #     - uses: actions/checkout@v4
  #     - name: Run tests
  #       run: swift test
  #     - name: Run tests (release)
  #       run: swift test -c release

  check-macro-compatibility:
    name: Check Macro Compatibility
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Swift Macro Compatibility Check
        uses: Matejkob/swift-macro-compatibility-check@v1
        with:
          run-tests: false
          major-versions-only: true
